$kind: http-request
url: http://localhost:3000/api/v1/auth/register
method: POST
body:
  type: json
  content: "{\r

    \    \"username\": \"{{testName}}\",\r

    \    \"email\": \"{{testName}}@gmail.com\",\r

    \    \"password\": \"000000\"\r

    }\r

    // // email already in use\r

    // {\r

    //     \"username\": \"May\",\r

    //     \"email\": \"may@gmail.com\",\r

    //     \"password\": \"000000\"\r

    // }"
scripts:
  - type: beforeRequest
    code: "const testName = pm.variables.replaceIn(\"{{$randomFirstName}}\");\r

      pm.environment.set(\"testName\", testName);"
    language: text/javascript
  - type: afterResponse
    code: "const res = pm.response.json();\r

      \r

      pm.test(\"Status code is 201\", function () {\r

      \    pm.response.to.have.status(201);\r

      });\r

      \r

      pm.environment.set(\"token\", res.token);\r

      pm.execution.setNextRequest(\"login\");"
    language: text/javascript
order: 1000
