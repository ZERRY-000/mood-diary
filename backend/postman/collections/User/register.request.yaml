$kind: http-request
url: "{{baseURL}}/api/v1/auth/register"
method: POST
body:
  type: json
  content: |
    {
      "username": "{{testName}}",
      "email": "{{testName}}@gmail.com",
      "password": "000000"
    }
    // // email already in use
    // {
    //     "username": "May",
    //     "email": "may@gmail.com",
    //     "password": "000000"
    // }
scripts:
  - type: beforeRequest
    code: |
      const testName = pm.variables.replaceIn('{{$randomFirstName}}')
      pm.environment.set("testName", testName);
    language: text/javascript
  - type: afterResponse
    code: |
      const res = pm.response.json();

      pm.test("Status code is 201", function () {
        pm.response.to.have.status(201);
      });

      pm.environment.set("token", res.token);
      pm.execution.setNextRequest("login");
    language: text/javascript
order: 2000
