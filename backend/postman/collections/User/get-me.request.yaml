$kind: http-request
name: get-me
url: "{{baseURL}}/api/v1/auth/me"
method: GET
auth:
  type: bearer
  credentials:
    token: "{{token}}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      pm.execution.setNextRequest(null);"
    language: text/javascript
order: 4000
