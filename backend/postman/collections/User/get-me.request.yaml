$kind: http-request
url: "{{baseURL}}/api/v1/auth/me"
method: GET
auth:
  type: bearer
  credentials:
    token: "{{token}}"
scripts:
- type: afterResponse
  code: |
    pm.test("Status code is 200", function () {
      pm.response.to.have.status(200);
    });
    pm.execution.setNextRequest(null);
  language: text/javascript
order: 5000
