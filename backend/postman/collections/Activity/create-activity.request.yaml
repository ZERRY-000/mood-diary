$kind: http-request
name: create-activity
url: "{{baseURL}}/api/v1/activities"
method: POST
body:
  type: json
  content: "{\r

    \  \"userId\": \"69d8611214787c68535b7451\",\r

    \  \"activity\": \"{{randomActivity}}\",\r

    \  \"description\": \"{{activityDescription}}\",\r

    \  \"start_time\": \"{{activityStartTime}}\",\r

    \  \"end_time\": \"{{activityEndTime}}\",\r

    \  \"duration_minutes\": {{activityDuration}},\r

    \  \"mood\": { \"happy\": 4, \"sad\": 1, \"angry\": 1, \"fearful\": 2, \"disgusted\": 2, \"surprised\": 1 }\r

    }"
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: "const res = pm.response.json();\r

      pm.environment.set(\"recentActivityId\", res.id);\r\n"
    language: text/javascript
  - type: beforeRequest
    code: "function randomActivity() {\r

      \  const activity = [\r

      \    \"work\", \r

      \    \"exercise\", \r

      \    \"learn\", \r

      \    \"hobby\", \r

      \    \"games\", \r

      \    \"music\", \r

      \    \"social\", \r

      \    \"rest\",\r

      \    \"eating\",\r

      \    \"other\", \r

      \  ]\r

      \  return activity[Math.floor(Math.random() * activity.length)]\r

      }\r

      \r

      const duration = 45;\r

      const duration_ms = 45 * 60 * 1000;\r

      const now = new Date();\r

      const activityEndTime = new Date(now.getTime());\r

      const activityStartTime = new Date(now.getTime() - duration_ms);\r

      const activityDescription = pm.variables.replaceIn(\"{{$randomLoremSentence}}\")\r

      pm.environment.set(\"randomActivity\", randomActivity())\r

      pm.environment.set(\"activityDescription\", activityDescription)\r

      pm.environment.set(\"activityDuration\", duration);\r

      pm.environment.set(\"activityEndTime\", activityEndTime);\r

      pm.environment.set(\"activityStartTime\", activityStartTime);\r\n"
    language: text/javascript
order: 3000
