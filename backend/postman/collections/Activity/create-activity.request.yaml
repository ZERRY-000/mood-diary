$kind: http-request
name: create-activity
url: "{{baseURL}}/api/v1/activities"
method: POST
body:
  type: json
  content: |
    {
      "activity": "{{randomActivity}}",
      "description": "{{activityDescription}}",
      "start_time": "{{activityStartTime}}",
      "end_time": "{{activityEndTime}}",
      "duration_minutes": {{activityDuration}},
      "mood": { "happy": 4, "sad": 1, "angry": 1, "fearful": 2, "disgusted": 2, "surprised": 1 }
    }
auth:
  type: bearer
  credentials:
    token: "{{token}}"
scripts:
  - type: afterResponse
    code: |
      const res = pm.response.json();
      pm.environment.set("recentActivityId", res.id);

      pm.execution.setNextRequest("08ece06CEBd536ABac1Aa6E0")
    language: text/javascript
    requests:
      08ece06CEBd536ABac1Aa6E0:
        workspace: a344ab1d-7797-4762-93b9-46fde8851e8c
        collection: eFF5b0E36fBbA38F821E8c0F
        location:
          - Activity
          - update-activity
  - type: beforeRequest
    code: |
      function randomActivity() {
        const activity = [
          "work", 
          "exercise", 
          "learn", 
          "hobby", 
          "games", 
          "music", 
          "social", 
          "rest",
          "eating",
          "other", 
        ]
        return activity[Math.floor(Math.random() * activity.length)]
      }

      const duration = 45;
      const duration_ms = 45 * 60 * 1000;
      const now = new Date();
      const activityEndTime = new Date(now.getTime());
      const activityStartTime = new Date(now.getTime() - duration_ms);
      const activityDescription = pm.variables.replaceIn("{{$randomLoremSentence}}")
      pm.environment.set("randomActivity", randomActivity())
      pm.environment.set("activityDescription", activityDescription)
      pm.environment.set("activityDuration", duration);
      pm.environment.set("activityEndTime", activityEndTime);
      pm.environment.set("activityStartTime", activityStartTime);

      // console.log(pm.info.requestId)
    language: text/javascript
order: 2000
