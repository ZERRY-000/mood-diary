$kind: http-request
url: http://localhost:3000/api/v1/activities
method: POST
body:
  type: json
  content: "{\r

    \  \"userId\": \"69d8611214787c68535b7451\",\r

    \  \"activity\": \"learn\",\r

    \  \"description\": \"Implement frontend before go to Uni\",\r

    \  \"start_time\": \"{{start-thai-time}}\",\r

    \  \"end_time\": \"{{end-thai-time}}\",\r

    \  \"duration_minutes\": {{activity-duration}},\r

    \  \"mood\": { \"happy\": 4, \"sad\": 1, \"angry\": 1, \"fearful\": 2, \"disgusted\": 2, \"surprised\": 1 }\r

    }"
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: "const res = pm.response.json();\r

      pm.environment.set(\"recent-activity-id\", res.id);\r\n"
    language: text/javascript
  - type: beforeRequest
    code: "const duration = 45;\r

      const duration_ms = 45 * 60 * 1000;\r

      const now = new Date();\r

      const thaiOffset = 7 * 60 * 60 * 1000;\r

      const end_thai_time = new Date(now.getTime() + thaiOffset);\r

      const start_thai_time = new Date(now.getTime() + thaiOffset - duration_ms);\r

      \r

      pm.environment.set(\"activity-duration\", duration);\r

      pm.environment.set(\"end-thai-time\", end_thai_time.toISOString());\r

      pm.environment.set(\"start-thai-time\", start_thai_time.toISOString());\r\n"
    language: text/javascript
order: 3000
