$kind: http-request
name: update-activity
url: "{{baseURL}}/api/v1/activities/{{recentActivityId}}"
method: PUT
body:
  type: json
  content: "  {\r

    \    \"activity\": \"Napping\",\r

    \    \"description\": \"Accidental 2-hour nap\",\r

    \    \"start_time\": \"{{activityStartTime}}\",\r

    \    \"end_time\": \"{{activityEndTime}}\",\r

    \    \"duration_minutes\": 120,\r

    \    \"mood\": { \"happy\": 5, \"sad\": 1, \"angry\": 1, \"fearful\": 1, \"disgusted\": 1, \"surprised\": 2 }\r

    \  }"
auth:
  type: bearer
  credentials:
    token: "{{token}}"
scripts:
  - type: beforeRequest
    code: // console.log(pm.info.requestId)
    language: text/javascript
  - type: afterResponse
    code: pm.execution.setNextRequest("eBE27e888f4Abb19aDE261F8")
    language: text/javascript
    requests:
      eBE27e888f4Abb19aDE261F8:
        workspace: a344ab1d-7797-4762-93b9-46fde8851e8c
        collection: eFF5b0E36fBbA38F821E8c0F
        location:
          - Activity
          - delete-activity
order: 3000
